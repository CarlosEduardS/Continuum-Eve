<app-layout-main-interface>
    <form class="main">
        <div class="primary">
            <div [class]="'pulse-orbe '+ status"></div>
            <span>O robo esta atualmente: <b>{{status}}</b> </span>
            <button type="button" (click)="ToggleMap()">Ver Detalhes ></button>
        </div>
        <div class="secondary">
            <app-card type="status-display">
                <form>
                    <p>Nivel de bateria em: <b>{{batery}}</b>{{charge}}</p>
                </form>
            </app-card>
            <app-card type="status-display">
                <form>
                    <p>Total de plantas plantadas: <b>{{TPlanted}}</b></p>
                    <p>Numero de plantas plantadas hoje: <b>{{AcPlanted}}</b></p>
                </form>
            </app-card>
            <app-card type="status-display">
                <form>
                    <p>Distancia detectada: <b>{{distance}}cm</b></p>
                </form>
            </app-card>
        </div>
        <app-card type="banner">
            <form>
                <p>Em desenvolvimento...</p>
            </form>
        </app-card>
        <div class="secondary">
            <app-card type="status-display">
                <form>
                    <p>INFO 1</p>
                </form>
            </app-card>
            <app-card type="status-display">
                <form>
                    <p>INFO 2</p>
                </form>
            </app-card>
            <app-card type="status-display">
                <form>
                    <p>INFO 3</p>
                </form>
            </app-card>
        </div>
    </form>
</app-layout-main-interface>

@if (isMapTrue) {
    <app-map-info-component (isReturn)="ToggleMap()"/>
}
