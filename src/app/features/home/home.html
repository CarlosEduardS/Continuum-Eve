<app-layout-main-interface>
    <form class="main">
        <div class="primary">
            <div class="pulse-orbe"></div>
            <span>O robo esta atualmente: <b>{{status}}</b> </span>
            <button>Visualizar</button>
        </div>
        <div class="secondary">
            <app-card type="status-display">
                <form>
                    <p>Nivel de bateria em: <b>{{batery}}</b></p>
                </form>
            </app-card>
            <app-card type="status-display">
                <form>
                    <p>Total de plantas plantadas: <b>{{TPlanted}}</b></p>
                    <p>Numero atual de plantas plantadas: <b>{{AcPLanted}}</b></p>
                </form>
            </app-card>
            <app-card type="status-display">
                <form>
                    <p>Distancia detectada: <b>{{distance}}cm</b></p>
                </form>
            </app-card>
        </div>
    </form>
</app-layout-main-interface>
